<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grade Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --card: #13161d;
      --border: #1f2330;
      --accent: #5cf0a0;
      --accent2: #4de0f5;
      --warn: #f0c45c;
      --danger: #f06060;
      --text: #e8eaf0;
      --muted: #6b7280;
      --radius: 14px;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 16px;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(92,240,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(92,240,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease both;
    }

    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--accent);
      border: 1px solid rgba(92,240,160,0.3);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 8px;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
      animation: fadeUp 0.5s ease both;
    }

    .card-title {
      font-size: 0.75rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    /* Subject rows */
    #subjects-list { display: flex; flex-direction: column; gap: 12px; }

    .subject-row {
      display: grid;
      grid-template-columns: 1fr 90px 90px 36px;
      gap: 10px;
      align-items: center;
      animation: fadeUp 0.3s ease both;
    }

    input[type="text"], input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      padding: 10px 12px;
      width: 100%;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .delete-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      height: 38px; width: 36px;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .delete-btn:hover { border-color: var(--danger); color: var(--danger); }

    .col-labels {
      display: grid;
      grid-template-columns: 1fr 90px 90px 36px;
      gap: 10px;
      margin-bottom: 8px;
    }
    .col-labels span {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Buttons */
    .btn-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

    button {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      transition: all 0.2s;
    }

    .btn-add {
      background: rgba(92,240,160,0.1);
      color: var(--accent);
      border: 1px solid rgba(92,240,160,0.3);
    }
    .btn-add:hover { background: rgba(92,240,160,0.2); }

    .btn-calc {
      background: var(--accent);
      color: #0d0f14;
      flex: 1;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
    }
    .btn-calc:hover { background: #7af7b8; transform: translateY(-1px); }

    .btn-reset {
      background: rgba(240,96,96,0.1);
      color: var(--danger);
      border: 1px solid rgba(240,96,96,0.2);
    }
    .btn-reset:hover { background: rgba(240,96,96,0.2); }

    /* Result card */
    #result-card {
      display: none;
      animation: fadeUp 0.4s ease both;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-val {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
    }

    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 6px;
    }

    .grade-badge {
      display: inline-block;
      font-size: 2.5rem;
      font-weight: 800;
      padding: 6px 20px;
      border-radius: 10px;
    }

    /* Subject breakdown table */
    .breakdown {
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    .breakdown-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.9rem;
    }

    .breakdown-row:last-child { border-bottom: none; }

    .sub-name { color: var(--text); font-weight: 600; }

    .sub-score {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
    }

    .sub-grade {
      font-weight: 700;
      font-size: 0.85rem;
      min-width: 36px;
      text-align: right;
    }

    /* Progress bar */
    .progress-wrap {
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      margin-top: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 500px) {
      .subject-row { grid-template-columns: 1fr 70px 70px 34px; }
      .col-labels  { grid-template-columns: 1fr 70px 70px 34px; }
      .result-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">IT STUDENT TOOLKIT</div>
    <h1>Grade Calculator</h1>
    <p>Enter your subjects, marks, and max marks to calculate your GPA.</p>
  </header>

  <!-- Input card -->
  <div class="card" style="animation-delay:0.1s">
    <div class="card-title">📚 Your Subjects</div>
    <div class="col-labels">
      <span>Subject</span>
      <span>Marks</span>
      <span>Out of</span>
      <span></span>
    </div>
    <div id="subjects-list"></div>
    <div class="btn-row">
      <button class="btn-add" onclick="addSubject()">+ Add Subject</button>
      <button class="btn-reset" onclick="resetAll()">Reset</button>
      <button class="btn-calc" onclick="calculate()">Calculate →</button>
    </div>
  </div>

  <!-- Result card -->
  <div class="card" id="result-card">
    <div class="card-title">📊 Your Results</div>

    <div class="result-grid" id="result-grid"></div>

    <div class="breakdown">
      <div class="breakdown-title">Subject Breakdown</div>
      <div id="breakdown-list"></div>
    </div>
  </div>

</div>

<script>
  // ── Data ──────────────────────────────────────────────────────────────────
  let subjects = [];

  function uid() { return Math.random().toString(36).slice(2, 8); }

  function getGrade(pct) {
    if (pct >= 91) return { letter: 'O',   color: '#5cf0a0', gp: 10 };
    if (pct >= 81) return { letter: 'A++', color: '#4de0f5', gp: 9  };
    if (pct >= 71) return { letter: 'A+',  color: '#60c5ff', gp: 8  };
    if (pct >= 61) return { letter: 'A',   color: '#a78bfa', gp: 7  };
    if (pct >= 51) return { letter: 'B++', color: '#fbbf24', gp: 6  };
    if (pct >= 40) return { letter: 'B+',  color: '#fb923c', gp: 5  };
    return                { letter: 'F',   color: '#f06060', gp: 0  };
  }

  // ── DOM helpers ───────────────────────────────────────────────────────────
  function renderSubjects() {
    const list = document.getElementById('subjects-list');
    list.innerHTML = '';
    subjects.forEach(s => {
      const row = document.createElement('div');
      row.className = 'subject-row';
      row.id = `row-${s.id}`;
      row.innerHTML = `
        <input type="text"   placeholder="e.g. Mathematics"
               value="${s.name}" oninput="update('${s.id}','name',this.value)"/>
        <input type="number" placeholder="78" min="0"
               value="${s.marks}" oninput="update('${s.id}','marks',this.value)"/>
        <input type="number" placeholder="100" min="1"
               value="${s.max}" oninput="update('${s.id}','max',this.value)"/>
        <button class="delete-btn" onclick="removeSubject('${s.id}')">✕</button>
      `;
      list.appendChild(row);
    });
  }

  function addSubject() {
    subjects.push({ id: uid(), name: '', marks: '', max: 100 });
    renderSubjects();
    // Focus the new name input
    const rows = document.querySelectorAll('.subject-row');
    const last = rows[rows.length - 1];
    if (last) last.querySelector('input').focus();
  }

  function removeSubject(id) {
    subjects = subjects.filter(s => s.id !== id);
    renderSubjects();
  }

  function update(id, field, val) {
    const s = subjects.find(s => s.id === id);
    if (s) s[field] = field === 'name' ? val : parseFloat(val) || '';
  }

  function resetAll() {
    subjects = [];
    addSubject(); addSubject(); addSubject();
    document.getElementById('result-card').style.display = 'none';
  }

  // ── Calculate ─────────────────────────────────────────────────────────────
  function calculate() {
    // Sync inputs → objects (in case events lagged)
    document.querySelectorAll('.subject-row').forEach(row => {
      const [nameI, marksI, maxI] = row.querySelectorAll('input');
      const id = row.id.replace('row-', '');
      const s = subjects.find(s => s.id === id);
      if (s) {
        s.name  = nameI.value.trim();
        s.marks = parseFloat(marksI.value) || 0;
        s.max   = parseFloat(maxI.value)   || 100;
      }
    });

    const valid = subjects.filter(s => s.name && s.max > 0 && s.marks !== '');
    if (valid.length === 0) {
      alert('Please add at least one subject with marks!');
      return;
    }

    // Stats
    const totalMarks = valid.reduce((a,s) => a + s.marks, 0);
    const totalMax   = valid.reduce((a,s) => a + s.max, 0);
    const pct        = (totalMarks / totalMax) * 100;
    const cgpa       = valid.reduce((a,s) => a + getGrade((s.marks/s.max)*100).gp, 0) / valid.length;
    const overall    = getGrade(pct);

    // Result grid
    const grid = document.getElementById('result-grid');
    grid.innerHTML = `
      <div class="stat-box">
        <div class="stat-val" style="color:${overall.color}">${pct.toFixed(1)}%</div>
        <div class="stat-label">Percentage</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:${overall.color}">${cgpa.toFixed(2)}</div>
        <div class="stat-label">CGPA / 10</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">
          <span class="grade-badge" style="color:${overall.color}">${overall.letter}</span>
        </div>
        <div class="stat-label">Overall Grade</div>
      </div>
    `;

    // Breakdown
    const bl = document.getElementById('breakdown-list');
    bl.innerHTML = valid.map(s => {
      const sp   = (s.marks / s.max) * 100;
      const sg   = getGrade(sp);
      return `
        <div class="breakdown-row">
          <span class="sub-name">${s.name}</span>
          <div style="flex:1; margin: 0 16px;">
            <div class="progress-wrap">
              <div class="progress-fill" style="width:${sp}%; background:${sg.color}"></div>
            </div>
          </div>
          <span class="sub-score" style="color:var(--muted)">${s.marks}/${s.max}</span>
          <span class="sub-grade" style="color:${sg.color}">${sg.letter}</span>
        </div>
      `;
    }).join('');

    // Show result
    const rc = document.getElementById('result-card');
    rc.style.display = 'block';
    rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  // Pre-fill 3 subjects
  ['Mathematics', 'Physics', 'Programming'].forEach(name => {
    subjects.push({ id: uid(), name, marks: '', max: 100 });
  });
  renderSubjects();
</script>
</body>
</html>
